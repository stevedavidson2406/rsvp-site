<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RSVP for Parvez & Mehzabin's Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Cormorant Garamond', serif;
  background: #f5f3ef;
  color: #1a1a1a;
  text-align: center;
  overflow-x: hidden;
}

/* INTRO SCREEN */
#intro {
  position: fixed;
  inset: 0;
  background: #f5f3ef;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 1s ease;
}

#intro h1 {
  font-family: 'Tangerine', cursive;
  font-size: 60px;
  color: #c4a974;
}

#intro button {
  margin-top: 20px;
  padding: 12px 30px;
  border: 1px solid #c4a974;
  background: transparent;
  color: #c4a974;
  letter-spacing: 2px;
}

/* MAIN SITE */
.container {
  max-width: 700px;
  margin: auto;
  padding: 40px 20px;
  display: none;
}

h1 {
  font-family: 'Tangerine', cursive;
  font-size: 80px;
  color: #c4a974;
}

.gold { color: #c4a974; }

.box {
  border: 1px solid rgba(196,169,116,0.3);
  padding: 30px;
  margin: 40px 0;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  margin-bottom: 20px;
  border: 1px solid rgba(196,169,116,0.4);
}

button.main-btn {
  background: #c4a974;
  color: white;
  border: none;
  padding: 14px;
  width: 100%;
}

iframe {
  width: 100%;
  height: 300px;
  border: none;
}

/* PARTICLES */
.particle {
  position: fixed;
  width: 5px;
  height: 5px;
  background: #c4a974;
  border-radius: 50%;
  opacity: 0.4;
  animation: float 10s infinite linear;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<!-- 🌟 INTRO SCREEN -->
<div id="intro">
  <h1>Parvez & Mehzabin</h1>
  <button onclick="startExperience()">Begin</button>
</div>

<!-- MAIN CONTENT -->
<div class="container" id="mainContent">

<p class="gold">Together with their families,</p>

<p>
request the honour of your gracious presence<br>
to celebrate a beautiful beginning of
</p>

<h1>Parvez & Mehzabin</h1>

<p>
as they embark on their journey of love and forever
</p>

<div class="box">
  <h2 class="gold">Saturday, April 11th, 2026</h2>
  <p>4:00 PM – 10:00 PM</p>
  <p><b>RK9 Villa and Resort</b><br>Bilwaradahalli, 560083</p>
</div>

<iframe src="https://maps.google.com/maps?q=RK9%20Villa%20and%20Resort&t=&z=15&ie=UTF8&iwloc=&output=embed"></iframe>

<div class="box">
<form action="https://docs.google.com/forms/d/e/1FAIpQLSdb3OiwxA4AonvLqZ7FmFktpQPoI0D1DZlnYiCaJ_eky5L3jg/formResponse" method="POST" target="hidden_iframe">

<label>Full Name *</label>
<input type="text" name="entry.1595813428" required>

<label>Will you attend? *</label>
<select name="entry.1117028700" required>
<option value="">Select</option>
<option value="Joyfully Accept">Joyfully Accept</option>
<option value="Regretfully Decline">Regretfully Decline</option>
</select>

<button class="main-btn">SEND RSVP</button>
</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>
</div>

</div>

<!-- SCRIPT -->
<script>
function startExperience() {
  const music = document.getElementById("music");

  music.volume = 0.3;
  music.play();

  document.getElementById("intro").style.opacity = "0";

  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  }, 1000);
}

// particles
for (let i = 0; i < 25; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random()*10) + "s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
